<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Genosyn — live browser</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      #stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      #status {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: #1e293b;
        border-bottom: 1px solid #334155;
        font-size: 12px;
        line-height: 1.3;
        min-height: 30px;
      }
      #status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #475569;
        flex: 0 0 auto;
      }
      #status .dot.live { background: #10b981; box-shadow: 0 0 6px #10b981; }
      #status .dot.pending { background: #f59e0b; }
      #status .dot.closed { background: #94a3b8; }
      #status .url {
        flex: 1 1 auto;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #cbd5e1;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, monospace;
        font-size: 11px;
      }
      #status .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 7px;
        border-radius: 9999px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: rgba(30, 64, 175, 0.25);
        color: #93c5fd;
      }
      #status .badge.driving { background: rgba(16, 185, 129, 0.18); color: #6ee7b7; }
      #takeover {
        appearance: none;
        background: #334155;
        border: 1px solid #475569;
        color: #e2e8f0;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        flex: 0 0 auto;
      }
      #takeover:hover { background: #475569; }
      #takeover.active { background: #10b981; border-color: #10b981; color: #0f172a; }
      #takeover.active:hover { background: #34d399; border-color: #34d399; }
      #canvas-wrap {
        flex: 1 1 auto;
        position: relative;
        overflow: hidden;
        background: #020617;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        max-width: 100%;
        max-height: 100%;
        background: #fff;
        box-shadow: 0 0 0 1px #1e293b;
        cursor: default;
      }
      canvas.takeover { cursor: crosshair; }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #94a3b8;
        font-size: 13px;
        text-align: center;
        padding: 24px;
        pointer-events: none;
      }
      #overlay.hidden { display: none; }
      #overlay .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #334155;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #overlay h1 {
        font-size: 14px;
        font-weight: 600;
        color: #e2e8f0;
        margin: 0;
      }
      #overlay p { margin: 0; max-width: 360px; line-height: 1.5; }
      .hint {
        font-size: 10px;
        color: #64748b;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="status" role="status" aria-live="polite">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Connecting…</span>
        <span class="url" id="status-url"></span>
        <span class="badge" id="status-badge">Observing</span>
        <span class="hint" id="status-hint"></span>
        <button id="takeover" type="button" aria-pressed="false">Take over</button>
      </div>
      <div id="canvas-wrap">
        <canvas id="screen" width="1280" height="800" tabindex="0"></canvas>
        <div id="overlay">
          <div class="spinner"></div>
          <h1>Waiting for the agent</h1>
          <p>The AI hasn&apos;t opened a page yet. The live view will start the moment it does.</p>
        </div>
      </div>
    </div>
    <script src="./view.js" type="module"></script>
  </body>
</html>
