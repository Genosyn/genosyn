<!doctype html>
<html lang="en">
  <head>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

      name="theme-color"

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
