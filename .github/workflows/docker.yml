name: Build & publish images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "App/**"
      - "Home/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "App/**"
      - "Home/**"
      - ".github/workflows/docker.yml"
  # release.yml dispatches this workflow after creating a v*.*.* tag, because
  # tags created by GITHUB_TOKEN don't fire the push trigger above.
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: App
            image: app
            context: ./App
          - project: Home
            # Build from repo root so Home's prebuild (sync-cli) can reach
            # ../CLI/. See Home/Dockerfile for details.
            image: home
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Dockerfile exists
        id: exists
        run: |
          if [ -f "${{ matrix.project }}/Dockerfile" ] && [ -f "${{ matrix.project }}/package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.project }} is not buildable yet — skipping."
          fi

      - name: Set image name (lowercase owner)
        if: steps.exists.outputs.ready == 'true'
        id: img
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=${{ env.REGISTRY }}/${OWNER}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.exists.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.exists.outputs.ready == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.exists.outputs.ready == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        if: steps.exists.outputs.ready == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ./${{ matrix.project }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
