name: Build & publish images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "App/**"
      - "Home/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "App/**"
      - "Home/**"
      - ".github/workflows/docker.yml"
  # release.yml dispatches this workflow after creating a v*.*.* tag, because
  # tags created by GITHUB_TOKEN don't fire the push trigger above.
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: App
            image: app
            context: ./App
          - project: Home
            # Build from repo root so Home's prebuild (sync-cli) can reach
            # ../CLI/. See Home/Dockerfile for details.
            image: home
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Dockerfile exists
        id: exists
        run: |
          if [ -f "${{ matrix.project }}/Dockerfile" ] && [ -f "${{ matrix.project }}/package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.project }} is not buildable yet — skipping."
          fi

      - name: Set image name (lowercase owner)
        if: steps.exists.outputs.ready == 'true'
        id: img
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=${{ env.REGISTRY }}/${OWNER}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      # QEMU registers binfmt handlers so buildx can cross-build arm64 on
      # this amd64 runner. arm64 builds are slow under emulation (chromium
      # apk + node-pty native rebuild dominate), but acceptable for a
      # release-cadence workflow.
      - name: Set up QEMU
        if: steps.exists.outputs.ready == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: steps.exists.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.exists.outputs.ready == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        if: steps.exists.outputs.ready == 'true'
        id: ver
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        if: steps.exists.outputs.ready == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        if: steps.exists.outputs.ready == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ./${{ matrix.project }}/Dockerfile
          # Publish multi-arch manifests covering both server fleets and
          # Apple Silicon dev machines. Alpine's chromium and node:22-alpine
          # both ship arm64; node-pty's postinstall rebuild handles the
          # native addon; goose's installer has `|| true` so an unsupported
          # arch falls back to the in-app installer.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          # Append after meta.outputs.labels so this overrides the auto-derived
          # version (which is "main" / "latest" for non-tag builds). genosyn
          # CLI reads this label to display the upgrade transition.
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ steps.ver.outputs.value }}
          # APP_VERSION + APP_COMMIT are baked into the App client bundle by
          # vite.config.ts (.git is outside App's build context). The Home
          # Dockerfile ignores these args, which is harmless.
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.value }}
            APP_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
