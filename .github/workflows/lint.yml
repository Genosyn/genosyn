name: Lint

on:
  push:
    branches: [main]
    paths:
      - "App/**"
      - "Home/**"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "App/**"
      - "Home/**"
      - ".github/workflows/lint.yml"

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & typecheck (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [App, Home]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check project exists
        id: exists
        run: |
          if [ -f "package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.project }}/package.json not present yet — skipping."
          fi

      - name: Setup Node
        if: steps.exists.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        if: steps.exists.outputs.ready == 'true'
        run: npm ci

      - name: Lint
        if: steps.exists.outputs.ready == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.exists.outputs.ready == 'true'
        run: npm run typecheck
